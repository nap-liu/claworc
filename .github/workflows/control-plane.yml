name: Control Plane

on:
  push:
    paths:
      - 'control-plane/**'
      - '.github/workflows/control-plane.yml'

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: control-plane/go.mod

      - name: Run unit tests
        uses: robherley/go-test-action@v0
        with:
          moduleDirectory: control-plane
          testarguments: ./internal/...

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: control-plane/go.mod

      - name: Run integration tests
        uses: robherley/go-test-action@v0
        with:
          moduleDirectory: control-plane
          testarguments: -tags docker_integration -timeout 1200s -count=1 ./internal/handlers/ -run TestIntegration
        env:
          CLAWORC_LLM_GATEWAY_PORT: 40001

  push:
    name: Build and Push Image
    if: github.ref == 'refs/heads/main'
    needs: [unit, integration]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push the image
        run: make control-plane
        env:
          CACHE_ARGS: --cache-from type=gha,scope=control-plane --cache-to type=gha,mode=max,scope=control-plane
